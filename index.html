<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Persona Studio | Neural Identity Forge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: radial-gradient(ellipse at 20% 30%, #0a0e1a 0%, #03050b 100%);
      color: #eef3fc;
      height: 100vh;
      overflow: hidden;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #11161f;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #3d5a82;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #5a7bb0;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* ========= SIDEBAR - PREMIUM DARK ========= */
    .sidebar {
      width: 380px;
      background: rgba(10, 14, 26, 0.92);
      backdrop-filter: blur(16px);
      padding: 28px 24px;
      border-right: 1px solid rgba(59, 88, 130, 0.4);
      display: flex;
      flex-direction: column;
      gap: 28px;
      box-shadow: 8px 0 28px rgba(0, 0, 0, 0.5);
      z-index: 2;
    }

    .sidebar h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(125deg, #c5dbff, #7ba2e6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      border-left: 3px solid #5d7fc7;
      padding-left: 16px;
    }

    .section {
      background: rgba(5, 9, 18, 0.65);
      border-radius: 24px;
      padding: 22px 20px;
      border: 1px solid rgba(69, 98, 145, 0.35);
      transition: all 0.2s;
    }

    .section h3 {
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #a2bdee;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      margin: 8px 0;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid #2a3857;
      background: #0c1120;
      color: #f0f5ff;
      font-size: 0.9rem;
      transition: all 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #6082c9;
      box-shadow: 0 0 0 3px rgba(96, 130, 201, 0.15);
      background: #0f1628;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1e2d4e;
      border: 1px solid #3a5682;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      margin-top: 12px;
    }

    button:hover {
      background: #2a3f66;
      transform: translateY(-1px);
      border-color: #6183c2;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
    }

    button:active {
      transform: translateY(1px);
    }

    /* PERSONA CARD - ELEGANT */
    .persona-card {
      margin-top: 8px;
      padding: 18px;
      background: rgba(4, 8, 17, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(81, 118, 175, 0.5);
      border-radius: 24px;
      animation: fadeInUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      max-height: 460px;
      overflow-y: auto;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .persona-card h3 {
      color: #c6ddff;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: -0.2px;
      border-left: 3px solid #5d7fc7;
      padding-left: 14px;
    }

    .persona-card p {
      margin: 10px 0;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .persona-card strong {
      color: #9bb9ef;
      font-weight: 600;
    }

    .persona-card .block {
      margin-top: 16px;
    }

    .persona-card h4 {
      color: #9bb9ef;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .persona-card ul {
      padding-left: 20px;
      margin: 6px 0;
    }

    .persona-card li {
      margin: 6px 0;
      font-size: 0.88rem;
      color: #e2ebff;
      line-height: 1.4;
    }

    /* CHAT SECTION */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 70% 30%, rgba(8, 13, 24, 0.6), #02050c);
    }

    .chat-header {
      padding: 22px 28px;
      background: rgba(6, 9, 18, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(59, 88, 130, 0.4);
    }

    .chat-header h2 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: #cbe2ff;
    }

    .chat-box {
      flex: 1;
      padding: 24px 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* message bubbles - refined */
    .msg {
      max-width: 72%;
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 0.9rem;
      line-height: 1.45;
      animation: messageSlide 0.25s ease;
      word-break: break-word;
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .user {
      background: #1f2b48;
      margin-left: auto;
      border-bottom-right-radius: 6px;
      border: 1px solid #3f5985;
    }

    .bot {
      background: rgba(12, 18, 30, 0.95);
      border-bottom-left-radius: 6px;
      border: 1px solid #2c4168;
    }

    /* input area */
    .input-box {
      display: flex;
      padding: 18px 24px 24px;
      gap: 12px;
      background: rgba(2, 5, 12, 0.8);
      backdrop-filter: blur(12px);
      border-top: 1px solid #232e48;
    }

    textarea {
      flex: 1;
      padding: 12px 20px;
      border-radius: 32px;
      border: 1px solid #31466f;
      background: #0c1120;
      color: #f0f5ff;
      resize: none;
      font-family: 'Inter', monospace;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #6082c9;
      box-shadow: 0 0 0 2px rgba(96, 130, 201, 0.2);
      background: #0f1628;
    }

    .input-box button {
      width: auto;
      padding: 0 32px;
      margin-left: 0;
      margin-top: 0;
      font-size: 1rem;
      font-weight: 600;
    }

    /* hidden utility */
    .hidden {
      display: none;
    }

    /* helper styles for persona card formatting */
    .pretty-box {
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 16px;
      border: 1px solid #2a3a5c;
      margin-top: 6px;
      font-size: 0.85rem;
    }

    .kv {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
    }

    .kv-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 5px 0;
      border-bottom: 1px dashed #2a3855;
    }

    .key {
      color: #9bb9ef;
      font-weight: 600;
      min-width: 110px;
      font-size: 0.85rem;
    }

    .value {
      color: #e2eaff;
      font-size: 0.85rem;
    }

    /* loading animation */
    .loading-dots {
      display: inline-flex;
      gap: 5px;
      background: transparent;
      padding: 4px 8px;
    }
    .loading-dots span {
      width: 6px;
      height: 6px;
      background: #8aabf0;
      border-radius: 50%;
      animation: pulseWave 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulseWave {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* toast message */
    .toast-notify {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #111827ee;
      backdrop-filter: blur(16px);
      padding: 10px 24px;
      border-radius: 60px;
      font-size: 0.8rem;
      border: 1px solid #5f7fb0;
      z-index: 1000;
      animation: toastFade 0.2s ease;
      color: #eef3ff;
    }
    @keyframes toastFade {
      from { opacity: 0; bottom: 0; }
      to { opacity: 1; bottom: 24px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <h1>WhoTheyAre?</h1>

    <div class="section">
      <h3>CREATE PERSONA</h3>
      <input id="business" placeholder="Business (e.g. Boutique Bakery)" />
      <input id="audience" placeholder="Target audience (e.g. Busy professionals)" />
      <button onclick="generatePersona()">Generate Persona</button>
    </div>

    <!-- PERSONA CARD (beautiful, emoji-free) -->
    <div id="personaCard" class="persona-card hidden"></div>
  </div>

  <!-- CHAT INTERFACE -->
  <div class="chat">
    <div class="chat-header">
      <h2>Conversation with Persona</h2>
    </div>
    <div class="chat-box" id="chatBox">
      <div class="msg bot">Generate a persona to begin. The AI will simulate a deep customer profile.</div>
    </div>
    <div class="input-box">
      <textarea id="message" placeholder="Ask your persona..."></textarea>
      <button onclick="sendChat()">Send</button>
    </div>
    <textarea id="persona" hidden></textarea>
  </div>
</div>

<script>
  const API = "https://whotheyare.onrender.com/api";
  let loadingIndicator = null;

  // Helper: show toast notification
  function showToast(message, isError = false) {
    const existing = document.querySelector('.toast-notify');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-notify';
    toast.innerText = message;
    if (isError) toast.style.borderColor = "#b04b5e";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3200);
  }

  /* ---------------- CHAT UI ---------------- */
  function addMessage(text, type) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  function showTypingIndicator() {
    removeTypingIndicator();
    const box = document.getElementById("chatBox");
    const loaderDiv = document.createElement("div");
    loaderDiv.className = "msg bot";
    loaderDiv.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;
    box.appendChild(loaderDiv);
    box.scrollTop = box.scrollHeight;
    loadingIndicator = loaderDiv;
  }

  function removeTypingIndicator() {
    if (loadingIndicator && loadingIndicator.parentNode) {
      loadingIndicator.remove();
      loadingIndicator = null;
    }
  }

  /* ---------------- PERSONA CARD RENDER (emoji-free, clean) ---------------- */
  function formatValue(value) {
    if (value === null || value === undefined) return "-";
    if (typeof value !== "object") {
      return `<span>${value}</span>`;
    }
    if (Array.isArray(value)) {
      if (value.length === 0) return "<span>-</span>";
      return `
        <ul>
          ${value.map(v => `<li>${formatValue(v)}</li>`).join("")}
        </ul>
      `;
    }
    return `
      <div class="kv">
        ${Object.entries(value).map(([k, v]) => `
          <div class="kv-row">
            <span class="key">${k}</span>
            <span class="value">${formatValue(v)}</span>
          </div>
        `).join("")}
      </div>
    `;
  }

  function renderPersonaCard(p) {
    const card = document.getElementById("personaCard");
    card.classList.remove("hidden");

    // helper to safely get values
    const name = p.name || "Unknown Persona";
    const age = p.age ?? "-";
    const job = p.job || "-";
    let goals = p.goals || [];
    if (!Array.isArray(goals)) goals = [goals];
    let frustrations = p.frustrations || [];
    if (!Array.isArray(frustrations)) frustrations = [frustrations];
    const budget = p.budget ?? "-";
    const buyingBehavior = p.buyingBehavior ?? "-";

    card.innerHTML = `
      <h3>${name}</h3>
      <p><strong>Age:</strong> ${formatValue(age)}</p>
      <p><strong>Occupation:</strong> ${formatValue(job)}</p>

      <div class="block">
        <h4>Goals & Aspirations</h4>
        <ul>
          ${goals.map(g => `<li>${g}</li>`).join("")}
        </ul>
      </div>

      <div class="block">
        <h4>Frustrations & Pain Points</h4>
        <ul>
          ${frustrations.map(f => `<li>${f}</li>`).join("")}
        </ul>
      </div>

      <div class="block">
        <h4>Budget</h4>
        <div class="pretty-box">
          ${formatValue(budget)}
        </div>
      </div>

      <div class="block">
        <h4>Buying Behavior</h4>
        <div class="pretty-box">
          ${formatValue(buyingBehavior)}
        </div>
      </div>
    `;
  }

  /* ---------------- GENERATE PERSONA (Backend API) ---------------- */
  async function generatePersona() {
    const business = document.getElementById("business").value.trim();
    const audience = document.getElementById("audience").value.trim();

    if (!business || !audience) {
      showToast("Please fill in both business and target audience fields.", true);
      return;
    }

    const generateBtn = document.querySelector('.section button');
    const originalText = generateBtn.innerText;
    generateBtn.innerText = "Generating...";
    generateBtn.disabled = true;

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);

      const response = await fetch(`${API}/generate-persona`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ business, audience }),
        signal: controller.signal
      });
      clearTimeout(timeoutId);

      if (!response.ok) {
        let errorDetail = "";
        try { errorDetail = await response.text(); } catch(e) {}
        throw new Error(`Server error ${response.status}: ${errorDetail.slice(0, 100)}`);
      }

      const data = await response.json();

      // store persona for chat
      document.getElementById("persona").value = JSON.stringify(data);
      // render beautiful UI
      renderPersonaCard(data);

      // add welcome message from bot
      addMessage(`Persona "${data.name || 'profile'}" created. You can now ask about motivations, objections, and behaviors.`, "bot");
      showToast("Persona generated successfully.", false);
    } catch (err) {
      console.error("Generate error:", err);
      let friendlyMsg = "Failed to generate persona. Make sure backend is running on localhost:8080";
      if (err.name === "AbortError") friendlyMsg = "Request timeout. Backend took too long to respond.";
      if (err.message.includes("Failed to fetch")) friendlyMsg = "Cannot connect to API server. Please start the backend service.";
      showToast(friendlyMsg, true);
      document.getElementById("personaCard").classList.add("hidden");
    } finally {
      generateBtn.innerText = originalText;
      generateBtn.disabled = false;
    }
  }

  /* ---------------- CHAT WITH PERSONA ---------------- */
  async function sendChat() {
    const message = document.getElementById("message").value.trim();
    if (!message) {
      showToast("Please enter a message.", false);
      return;
    }

    const personaRaw = document.getElementById("persona").value;
    if (!personaRaw) {
      showToast("Generate a persona first before chatting.", true);
      return;
    }

    let persona;
    try {
      persona = JSON.parse(personaRaw);
    } catch(e) {
      showToast("Persona data corrupted. Please regenerate.", true);
      return;
    }

    // add user message to chat
    addMessage(message, "user");
    document.getElementById("message").value = "";
    // reset textarea height
    const textarea = document.getElementById("message");
    textarea.style.height = "auto";

    // show typing indicator from bot
    showTypingIndicator();

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 20000);

      const response = await fetch(`${API}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ persona, message }),
        signal: controller.signal
      });
      clearTimeout(timeoutId);

      removeTypingIndicator();

      if (!response.ok) {
        let errText = "";
        try { errText = await response.text(); } catch(e) {}
        throw new Error(`Chat API error (${response.status})`);
      }

      const data = await response.json();
      const botReply = data.response || "No response generated.";
      addMessage(botReply, "bot");
    } catch (err) {
      removeTypingIndicator();
      console.error("Chat error:", err);
      let errorMsg = "Chat service unavailable. Check backend connection.";
      if (err.name === "AbortError") errorMsg = "Chat request timed out. Please try again.";
      if (err.message.includes("Failed to fetch")) errorMsg = "Cannot reach API server for chat.";
      addMessage(`System: ${errorMsg}`, "bot");
      showToast(errorMsg, true);
    }
  }

  // Auto-resize textarea and allow Enter to send (without Shift)
  const chatTextarea = document.getElementById("message");
  if (chatTextarea) {
    chatTextarea.addEventListener("input", function() {
      this.style.height = "auto";
      this.style.height = Math.min(90, this.scrollHeight) + "px";
    });
    chatTextarea.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });
  }

  // Expose global functions
  window.generatePersona = generatePersona;
  window.sendChat = sendChat;

  // Initialize hidden persona card on load
  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("personaCard").classList.add("hidden");
    // placeholder styling consistency
    const businessInp = document.getElementById("business");
    const audienceInp = document.getElementById("audience");
    if (businessInp) businessInp.placeholder = "Business (e.g. Artisan Coffee Roaster)";
    if (audienceInp) audienceInp.placeholder = "Target audience (e.g. Remote professionals)";
  });
</script>
</body>
</html>
